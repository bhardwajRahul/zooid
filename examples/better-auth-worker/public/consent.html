<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Authorize</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #fafafa;
      }
      .card {
        width: 100%;
        max-width: 360px;
        padding: 2rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }
      .subtitle {
        font-size: 0.8125rem;
        color: #888;
        margin-bottom: 1.5rem;
      }
      .client {
        font-weight: 500;
        color: #fafafa;
      }
      ul {
        list-style: none;
        margin-bottom: 1.5rem;
      }
      li {
        font-size: 0.875rem;
        padding: 0.375rem 0;
        color: #ccc;
      }
      li::before {
        content: '\2713';
        margin-right: 0.5rem;
        color: #22c55e;
      }
      .actions {
        display: flex;
        gap: 0.5rem;
      }
      button {
        flex: 1;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
      }
      .allow {
        background: #fafafa;
        color: #0a0a0a;
      }
      .allow:hover {
        background: #e0e0e0;
      }
      .deny {
        background: #1a1a1a;
        color: #888;
        border: 1px solid #333;
      }
      .deny:hover {
        background: #222;
        color: #aaa;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Authorize</h1>
      <p class="subtitle">
        <span class="client" id="client-name"></span> wants to access your
        account
      </p>

      <ul id="scope-list"></ul>

      <div class="actions">
        <button class="deny" id="deny-btn">Deny</button>
        <button class="allow" id="allow-btn">Allow</button>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get('client_id') || 'An application';
      const scope = params.get('scope') || 'openid';
      const scopes = scope.split(' ').filter(Boolean);

      const scopeLabels = {
        openid: 'Verify your identity',
        profile: 'View your name and profile',
        email: 'View your email address',
        offline_access: 'Stay signed in',
      };

      document.getElementById('client-name').textContent = clientId;

      const list = document.getElementById('scope-list');
      for (const s of scopes) {
        const li = document.createElement('li');
        li.textContent = scopeLabels[s] || s;
        list.appendChild(li);
      }

      async function handleConsent(accept) {
        const btn = accept
          ? document.getElementById('allow-btn')
          : document.getElementById('deny-btn');
        btn.disabled = true;
        btn.textContent = accept ? 'Allowing...' : 'Denying...';

        const res = await fetch('/api/auth/oauth2/consent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ accept, oauth_query: window.location.search }),
          credentials: 'include',
        });

        const data = await res.json().catch(() => null);
        if (data?.redirectTo) {
          window.location.href = data.redirectTo;
        } else if (!accept) {
          window.close();
          window.location.href = '/';
        }
      }

      document
        .getElementById('allow-btn')
        .addEventListener('click', () => handleConsent(true));
      document
        .getElementById('deny-btn')
        .addEventListener('click', () => handleConsent(false));
    </script>
  </body>
</html>
