name = "ai-news-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[triggers]
crons = ["0 7 * * *"]

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "KV"
id = "f51f942d426b4e2fb547ec809dcc7303"

[vars]
ZOOID_SERVER = "https://beno.zooid.dev"
SUBREDDITS = "ai_agents,ClaudeAI,LocalLLaMA,claudecode,codex,openclaw"
BRIGHTDATA_DATASET_ID = "gd_lvz8ah06191smkebj4"

# Secrets (set via `wrangler secret put`):
# BRIGHTDATA_API_KEY
# ZOOID_PUBLISH_TOKEN

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1